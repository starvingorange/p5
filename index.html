<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>나의 p5.js 작품 모음</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        padding: 24px;
        background: #0f0f1a;
        font-family: "Segoe UI", sans-serif;
      }
      h1 {
        margin-bottom: 12px;
        font-size: 2.4rem;
        color: #fff;
        letter-spacing: 0.06em;
      }
      .subtitle {
        color: #ccc;
        font-size: 1rem;
        margin-bottom: 28px;
      }
      #projects {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
        width: 100%;
        max-width: 1080px;
        gap: 20px;
      }
      #projects .cell {
        aspect-ratio: 4 / 3;
        min-height: 360px;
        position: relative;
        overflow: hidden;
        border: 1px solid #333;
        border-radius: 14px;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        background: #111;
      }
      #projects .cell:hover {
        transform: translateY(-2px) scale(1.02);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
      }
      #projects .cell iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: none;
        pointer-events: none;
      }
      .cell-footer {
        position: absolute;
        left: 8px;
        right: 8px;
        bottom: 8px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
        z-index: 2;
      }
      .label {
        color: rgba(255, 255, 255, 0.95);
        font-size: 0.95rem;
        background: rgba(0, 0, 0, 0.75);
        padding: 6px 10px;
        border-radius: 8px;
      }
      .cell-footer a {
        font-size: 0.85rem;
        color: #fff;
        text-decoration: none;
        background: rgba(0, 110, 255, 0.95);
        padding: 8px 12px;
        border-radius: 8px;
        transition:
          background 0.2s,
          transform 0.2s;
      }
      .cell-footer a:hover {
        background: rgba(0, 110, 255, 1);
        transform: translateY(-1px);
      }
      .cell-links {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .cell-links a.preview {
        background: rgba(255, 255, 255, 0.92);
        color: #0f0f1a;
      }
    </style>
  </head>
  <body>
    <h1>나의 p5.js 작품</h1>
    <p class="subtitle">정적 → 동적 순서로 배열</p>
    <main id="projects">
      <div class="cell">
        <iframe src="sample1/index.html" scrolling="no"></iframe>
        <div class="cell-footer">
          <span class="label">과제 1 추상화 그리기</span>
          <div class="cell-links">
            <a
              class="preview"
              href="sample1/index.html"
              target="_blank"
              rel="noopener"
              >로컬 미리보기</a
            >
            <a
              href="https://editor.p5js.org/kyungjjoo/full/c_a6I7wp4"
              target="_blank"
              rel="noopener"
              >p5.js 열기</a
            >
          </div>
        </div>
      </div>
      <div class="cell">
        <iframe src="sample4/index.html" scrolling="no"></iframe>
        <div class="cell-footer">
          <span class="label"
            >과제 4 자신의 추상화에 시간에 따른 움직임 넣기</span
          >
          <div class="cell-links">
            <a
              class="preview"
              href="sample4/index.html"
              target="_blank"
              rel="noopener"
              >로컬 미리보기</a
            >
            <a
              href="https://editor.p5js.org/kyungjjoo/full/WHcg8j4He"
              target="_blank"
              rel="noopener"
              >p5.js 열기</a
            >
          </div>
        </div>
      </div>
      <div class="cell">
        <iframe src="sample2/index.html" scrolling="no"></iframe>
        <div class="cell-footer">
          <span class="label">과제 2 캐릭터 그리기</span>
          <div class="cell-links">
            <a
              class="preview"
              href="sample2/index.html"
              target="_blank"
              rel="noopener"
              >로컬 미리보기</a
            >
            <a
              href="https://editor.p5js.org/kyungjjoo/full/laqaFSbgK"
              target="_blank"
              rel="noopener"
              >p5.js 열기</a
            >
          </div>
        </div>
      </div>
      <div class="cell">
        <iframe src="sample3/index.html" scrolling="no"></iframe>
        <div class="cell-footer">
          <span class="label">과제 3 움직이는 캐릭터 그리기</span>
          <div class="cell-links">
            <a
              class="preview"
              href="sample3/index.html"
              target="_blank"
              rel="noopener"
              >로컬 미리보기</a
            >
            <a
              href="https://editor.p5js.org/kyungjjoo/full/cAFHeA7WH"
              target="_blank"
              rel="noopener"
              >p5.js 열기</a
            >
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
